<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>IMDF Preview (WGS84-aware)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://unpkg.com/maplibre-gl@3.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.4.0/dist/maplibre-gl.js"></script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%23007ACC'/%3E%3Ctext x='8' y='11' font-size='10' text-anchor='middle' fill='white'%3EIM%3C/text%3E%3C/svg%3E" />
  <style>
    body { margin:0; padding:0; font-family:system-ui, sans-serif; }
    #map { width:100vw; height:86vh; }
    #log { height:14vh; overflow:auto; padding:8px; background:#111; color:#fff; font-size:13px; }
    .warn { color:#ffd080; }
    .error { color:#ff8080; }
    small { color:#bbb; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="log">Log: 初期化中... <small>(WGS84チェッカー付き)</small></div>

<script>
const logEl = () => document.getElementById('log');
const appendLog = html => { logEl().innerHTML += '<br/>' + html; logEl().scrollTop = logEl().scrollHeight; };
const clearLog = () => { logEl().innerHTML = ''; };

appendLog('開始：WGS84(EPSG:4326)準拠チェック付きで読み込みます。');

// MapLibre 初期化（背景はOSMタイル）
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      "osm-tiles": {
        type: "raster",
        tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
        tileSize: 256
      }
    },
    layers: [
      { id: "osm-tiles", type: "raster", source: "osm-tiles" }
    ]
  },
  center: [139.7, 35.6],
  zoom: 16
});

// 読み込むファイル一覧（同フォルダ）
const geoFiles = [
  {id:'footprint', url:'footprint.geojson', type:'fill', paint: { 'fill-color': '#888', 'fill-opacity': 0.4 } },
  {id:'building',  url:'building.geojson',  type:'fill', paint: { 'fill-color': '#ff8800', 'fill-opacity': 0.5 } },
  {id:'venue',     url:'venue.geojson',     type:'line', paint: { 'line-color': '#0066cc', 'line-width': 2 } },
  {id:'address',   url:'address.geojson',   type:'symbol', layout: { 'text-field': ['coalesce', ['get','name'], ['get','address'], 'addr'], 'text-size': 12 } }
];

// ヘルパー：すべての座標配列を抽出して調べる
function iterateCoords(geojson, callback) {
  function recurseCoordArray(arr) {
    if (!Array.isArray(arr)) return;
    if (arr.length > 0 && typeof arr[0] === 'number') {
      // 単一座標 [x,y,(z?)]
      callback(arr);
      return;
    }
    arr.forEach(recurseCoordArray);
  }
  if (geojson.geometry) {
    recurseCoordArray(geojson.geometry.coordinates);
  } else if (geojson.features && Array.isArray(geojson.features)) {
    geojson.features.forEach(f => {
      if (f.geometry) recurseCoordArray(f.geometry.coordinates);
    });
  } else {
    // 単体GeometryCollection等
    recurseCoordArray(geojson.coordinates || []);
  }
}

// 判定ロジック：座標が [lon,lat] か [lat,lon] か推定する（多数決）
function guessOrder(geojson) {
  let total = 0, cntLonLat = 0, cntLatLon = 0, cntLarge = 0;
  iterateCoords(geojson, c => {
    total++;
    const x = c[0], y = c[1];
    if (Math.abs(x) > 1000 || Math.abs(y) > 1000) { cntLarge++; return; } // メートル系疑い（スキップ）
    // lon should be -180..180, lat -90..90
    if (x >= -180 && x <= 180 && y >= -90 && y <= 90) cntLonLat++;
    if (y >= -180 && y <= 180 && x >= -90 && x <= 90) cntLatLon++;
  });
  return { total, cntLonLat, cntLatLon, cntLarge };
}

// 座標入れ替え（lat,lon -> lon,lat）
function swapCoords(geojson) {
  function swapInArray(arr) {
    if (!Array.isArray(arr)) return;
    if (arr.length>0 && typeof arr[0] === 'number') {
      // swap first two
      const tmp = arr[0]; arr[0] = arr[1]; arr[1] = tmp;
      return;
    }
    arr.forEach(swapInArray);
  }
  if (geojson.geometry) swapInArray(geojson.geometry.coordinates);
  else if (geojson.features && Array.isArray(geojson.features)) {
    geojson.features.forEach(f => { if (f.geometry) swapInArray(f.geometry.coordinates); });
  } else {
    swapInArray(geojson.coordinates || []);
  }
  return geojson;
}

// degreeっぽいかの簡易判定（値域）
function looksLikeDegrees(c) {
  if (!Array.isArray(c) || c.length < 2) return false;
  const x = c[0], y = c[1];
  return Math.abs(x) <= 180 && Math.abs(y) <= 180 && Math.abs(x) > 0.000001 && Math.abs(y) > 0.000001;
}

// GeoJSON を検査して必要なら修正する（自動処理）
function normalizeGeoJSON(geojson, filename) {
  const g = guessOrder(geojson);
  appendLog(`${filename} : 座標サンプル数=${g.total}, lonLat判定=${g.cntLonLat}, latLon判定=${g.cntLatLon}, 大きな値(>1000)=${g.cntLarge}`);
  // メートル系疑いが多ければ警告して戻す（変換が必要）
  if (g.cntLarge > Math.max(1, g.total * 0.1)) {
    appendLog(`<span class="warn">${filename} にメートル系(UTM/ローカル)の可能性があります。ブラウザでの自動投影は困難です。ogr2ogrなどでEPSG:4326へ変換して下さい。</span>`);
    return { json: geojson, transformed: false, reason: 'projected' };
  }
  // 多数決で lat/lon 順が多ければ swap
  if (g.cntLatLon > g.cntLonLat) {
    appendLog(`<span class="warn">${filename} は [lat, lon] の順で作られているように見えます。自動で入れ替えを行います。</span>`);
    const swapped = swapCoords(JSON.parse(JSON.stringify(geojson)));
    // セーフティ：再判定
    const g2 = guessOrder(swapped);
    appendLog(`${filename} (入れ替え後) : lonLat=${g2.cntLonLat}, latLon=${g2.cntLatLon}`);
    if (g2.cntLonLat >= g2.cntLatLon) return { json: swapped, transformed: true, reason: 'swapped' };
    // もしまだ曖昧なら元に戻して警告だけ出す
    appendLog(`<span class="error">${filename} の入れ替えが確実ではありません。内容を確認してください。</span>`);
    return { json: geojson, transformed: false, reason: 'ambiguous' };
  }
  // 既に lon,lat らしければそのまま
  if (g.cntLonLat >= g.cntLatLon) {
    appendLog(`${filename} はおそらく正しい [lon, lat]（WGS84）です。`);
    return { json: geojson, transformed: false, reason: 'ok' };
  }
  appendLog(`<span class="warn">${filename} は座標判定が不明確です（少数のサンプル）。内容を確認してください。</span>`);
  return { json: geojson, transformed: false, reason: 'unknown' };
}

// メイン読み込み処理
Promise.all(geoFiles.map(g => fetch(g.url)
  .then(r => { if(!r.ok) throw new Error(`${g.url} HTTP ${r.status}`); return r.json(); })
  .then(json => ({g, json}))
  .catch(e => ({g, error:e}))
)).then(results => {
  appendLog('geojson 読み込み完了。IMDF向けにWGS84チェックを行います。');

  let bounds = new maplibregl.LngLatBounds();
  let anyFeature = false;

  results.forEach(res => {
    const g = res.g;
    if (res.error) {
      appendLog(`<span class="error">${g.url} 読み込みエラー: ${res.error.message}</span>`);
      return;
    }
    const data = res.json;

    // WGS84(経度緯度)基準で正しいか検査・必要なら自動修正
    const norm = normalizeGeoJSON(data, g.url);
    if (norm.reason === 'projected') {
      // 投影座標の可能性が高いので、無理な自動変換はせずユーザーへ促す
      appendLog(`<span class="error">${g.url} は投影座標の可能性が高いです。ブラウザでは正確に変換できないため、まずは ogr2ogr 等で EPSG:4326 に変換してください。</span>`);
      // それでも地図上に置いてみる（表示はするが位置ずれ予想）
      map.addSource(g.id, { type:'geojson', data: data });
    } else {
      // data を使う（norm.json は入れ替え済みの場合あり）
      map.addSource(g.id, { type:'geojson', data: norm.json });
    }

    // レイヤ追加
    const layer = { id:g.id + '-layer', type:g.type, source:g.id };
    if (g.paint) layer.paint = g.paint;
    if (g.layout) layer.layout = g.layout;
    map.addLayer(layer);
    appendLog(`${g.url} を追加 (${g.id})`);

    // bounds を拡張（norm.jsonがある場合はそちらを参照）
    const used = (norm && norm.json) ? norm.json : data;
    const coords = [];
    const gather = (f) => {
      if (!f) return;
      const geom = f.geometry;
      if(!geom) return;
      const collect = (c) => {
        if (typeof c[0] === 'number') coords.push(c);
        else c.forEach(collect);
      };
      if (geom.type === 'GeometryCollection') geom.geometries.forEach(g2 => collect(g2.coordinates));
      else collect(geom.coordinates);
    };
    if (Array.isArray(used.features)) used.features.forEach(f => { gather(f); });
    else gather(used);

    if (coords.length) {
      anyFeature = true;
      coords.forEach(c => {
        // coords 内の数値が度単位と見なせる場合のみ bounds に追加
        if (looksLikeDegrees(c)) bounds.extend(c);
      });
    }
  });

  if (anyFeature && !bounds.isEmpty()) {
    map.fitBounds(bounds, { padding: 20, maxZoom: 20 });
    appendLog('全レイヤに合わせてズームしました。');
  } else {
    appendLog('<span class="warn">注: GeoJSON に有効な緯度経度フィーチャが見つからなかったか、投影座標が多く含まれます。座標系を確認してから再度お試しください。</span>');
  }
}).catch(e => {
  appendLog(`<span class="error">読み込み処理で例外: ${e.message}</span>`);
});

map.on('load', () => appendLog('map loaded.'));
window.addEventListener('error', e => appendLog('<span class="error">JS Error: '+ e.message +'</span>'));
window.addEventListener('unhandledrejection', e => appendLog('<span class="error">Promise Rejection: '+ (e.reason && e.reason.message ? e.reason.message : e.reason) +'</span>'));
</script>
</body>
</html>
